{% extends "base.html" %}

{% block title %}システム管理者ログイン{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md">
        <!-- タイトル -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-900 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">システム管理者ログイン</h1>
            <p class="mt-2 text-sm text-gray-500">管理者アカウントでサインインしてください</p>
        </div>

        <!-- ログインカード -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            {% if error %}
            <div class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200">
                <p class="text-sm text-red-700">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- ユーザー名 -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1.5">
                        ユーザー名
                    </label>
                    <input type="text"
                           name="username"
                           id="id_username"
                           required
                           autofocus
                           class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400 transition-colors"
                           placeholder="ユーザー名を入力">
                </div>

                <!-- パスワード -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1.5">
                        パスワード
                    </label>
                    <input type="password"
                           name="password"
                           id="id_password"
                           required
                           class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400 transition-colors"
                           placeholder="パスワードを入力">
                </div>

                <!-- ログインボタン -->
                <button type="submit"
                        class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold
                               text-white bg-blue-900 hover:bg-blue-800
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                               transition-colors">
                    ログイン
                </button>
            </form>
        </div>

        <p class="mt-6 text-center text-sm text-gray-400">
            System Administration Portal
        </p>
    </div>
</div>
{% endblock %}
