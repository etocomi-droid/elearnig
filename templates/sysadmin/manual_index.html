{% extends "sysadmin/base_sysadmin.html" %}

{% block title %}マニュアル{% endblock %}
{% block page_title %}マニュアル{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- ヘッダー -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-8 mb-8 text-white">
        <h2 class="text-2xl font-bold mb-2">システム管理者マニュアル</h2>
        <p class="text-blue-100 text-sm">システム全体の管理操作ガイド</p>
    </div>

    <!-- 章一覧 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {% for ch in chapters %}
        <a href="{% url 'sysadmin:manual_chapter' ch.num %}"
           class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 hover:shadow-md hover:border-blue-300 transition-all group">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-sm font-bold flex-shrink-0 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    {{ ch.num }}
                </div>
                <div class="min-w-0">
                    <h3 class="text-sm font-semibold text-gray-900 group-hover:text-blue-600 transition-colors">
                        第{{ ch.num }}章　{{ ch.title }}
                    </h3>
                    <p class="text-xs text-gray-500 mt-1">{{ ch.desc }}</p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
