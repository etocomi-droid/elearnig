<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}会員サイト{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- ヘッダー -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="text-lg font-bold text-gray-900">
                {% block site_name %}会員サイト{% endblock %}
            </a>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <span class="text-sm text-gray-600">{{ user.email }}</span>
                <a href="{% url 'logout' %}" class="text-sm text-gray-500 hover:text-gray-700 transition-colors">ログアウト</a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- コンテンツ -->
    <main class="max-w-5xl mx-auto px-6 py-8">
        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-lg text-sm
                {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
                {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
                {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
