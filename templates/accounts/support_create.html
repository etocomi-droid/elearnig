{% extends "base_admin.html" %}

{% block page_title %}新規サポートスレッド{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <a href="{% url 'accounts:support_list' %}" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        サポート一覧に戻る
    </a>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-6">システム管理者へのお問い合わせ</h2>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="id_subject" class="block text-sm font-medium text-gray-700 mb-1.5">件名</label>
                <input type="text" name="subject" id="id_subject" required
                       class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="お問い合わせの件名">
            </div>

            <div>
                <label for="id_body" class="block text-sm font-medium text-gray-700 mb-1.5">本文</label>
                <textarea name="body" id="id_body" rows="6" required
                          class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                          placeholder="お問い合わせ内容を入力してください"></textarea>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                    送信する
                </button>
                <a href="{% url 'accounts:support_list' %}" class="text-sm text-gray-500 hover:text-gray-700">キャンセル</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
