{% extends 'base_admin.html' %}

{% block title %}オペレーター招待{% endblock %}
{% block page_title %}オペレーター招待{% endblock %}

{% block content %}
<div class="max-w-lg">
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">新しいメンバーを招待</h2>
        <p class="text-sm text-gray-500 mb-6">
            メールアドレスを入力してください。既にアカウントがある場合はそのユーザーを追加し、
            ない場合は自動的にアカウントを作成します。
        </p>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
                <input type="email" name="email" id="email" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="operator@example.com">
            </div>

            <div class="flex items-center gap-3">
                <button type="submit"
                        class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    招待する
                </button>
                <a href="{% url 'accounts:operator_list' %}"
                   class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    戻る
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
