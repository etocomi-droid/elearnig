{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="w-full max-w-md">
        <!-- ロゴ・タイトル -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">ログイン</h1>
            <p class="mt-2 text-sm text-gray-500">アカウントにサインインしてください</p>
        </div>

        <!-- ログインカード -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            {% if form.errors %}
            <div class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200">
                <p class="text-sm text-red-700">ユーザー名またはパスワードが正しくありません。</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- ユーザー名 -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1.5">
                        ユーザー名
                    </label>
                    <input type="text"
                           name="username"
                           id="id_username"
                           required
                           autofocus
                           class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400 transition-colors"
                           placeholder="ユーザー名を入力">
                </div>

                <!-- パスワード -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1.5">
                        パスワード
                    </label>
                    <div class="relative">
                        <input type="password"
                               name="password"
                               id="id_password"
                               required
                               class="block w-full px-4 py-2.5 pr-10 border border-gray-300 rounded-lg text-sm
                                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                      placeholder-gray-400 transition-colors"
                               placeholder="パスワードを入力">
                        <button type="button"
                                id="toggle-password"
                                class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition-colors">
                            <!-- 目アイコン（パスワード非表示時） -->
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <!-- 目に斜線アイコン（パスワード表示時） -->
                            <svg id="eye-off-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <!-- ログインボタン -->
                <button type="submit"
                        class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold
                               text-white bg-blue-600 hover:bg-blue-700
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                               transition-colors">
                    ログイン
                </button>
            </form>

            <!-- パスワードをお忘れの方 -->
            <div class="mt-4 text-center">
                <a href="{% url 'password_reset' %}" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">
                    パスワードをお忘れの方
                </a>
            </div>
        </div>

        <!-- サインアップリンク -->
        <p class="mt-6 text-center text-sm text-gray-500">
            アカウントをお持ちでない方は
            <a href="{% url 'signup' %}" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                新規登録
            </a>
        </p>
    </div>
</div>

<script>
document.getElementById('toggle-password').addEventListener('click', function() {
    var input = document.getElementById('id_password');
    var eyeIcon = document.getElementById('eye-icon');
    var eyeOffIcon = document.getElementById('eye-off-icon');
    if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.classList.add('hidden');
        eyeOffIcon.classList.remove('hidden');
    } else {
        input.type = 'password';
        eyeIcon.classList.remove('hidden');
        eyeOffIcon.classList.add('hidden');
    }
});
</script>
{% endblock %}
