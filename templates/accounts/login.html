{% extends "base.html" %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="w-full max-w-md">
        <!-- ロゴ・タイトル -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-blue-600 mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">ログイン</h1>
            <p class="mt-2 text-sm text-gray-500">アカウントにサインインしてください</p>
        </div>

        <!-- ログインカード -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            {% if form.errors %}
            <div class="mb-6 px-4 py-3 rounded-lg bg-red-50 border border-red-200">
                <p class="text-sm text-red-700">ユーザー名またはパスワードが正しくありません。</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- ユーザー名 -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1.5">
                        ユーザー名
                    </label>
                    <input type="text"
                           name="username"
                           id="id_username"
                           required
                           autofocus
                           class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400 transition-colors"
                           placeholder="ユーザー名を入力">
                </div>

                <!-- パスワード -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1.5">
                        パスワード
                    </label>
                    <input type="password"
                           name="password"
                           id="id_password"
                           required
                           class="block w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                                  placeholder-gray-400 transition-colors"
                           placeholder="パスワードを入力">
                </div>

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <!-- ログインボタン -->
                <button type="submit"
                        class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-semibold
                               text-white bg-blue-600 hover:bg-blue-700
                               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                               transition-colors">
                    ログイン
                </button>
            </form>
        </div>

        <!-- サインアップリンク -->
        <p class="mt-6 text-center text-sm text-gray-500">
            アカウントをお持ちでない方は
            <a href="{% url 'signup' %}" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                新規登録
            </a>
        </p>
    </div>
</div>
{% endblock %}
