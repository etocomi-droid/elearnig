{% for msg in thread_messages %}
<div class="flex {% if msg.is_from_admin %}justify-start{% else %}justify-end{% endif %}">
    <div class="max-w-[80%] {% if msg.is_from_admin %}bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm{% else %}bg-blue-600 text-white rounded-2xl rounded-tr-sm{% endif %} px-4 py-3">
        <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-semibold {% if msg.is_from_admin %}text-gray-600{% else %}text-blue-100{% endif %}">
                {% if msg.is_from_admin %}システム管理者{% elif msg.sender %}{{ msg.sender.username }}{% else %}不明{% endif %}
            </span>
            <span class="text-xs {% if msg.is_from_admin %}text-gray-400{% else %}text-blue-200{% endif %}">
                {{ msg.created_at|date:"m/d H:i" }}
            </span>
        </div>
        <p class="text-sm whitespace-pre-wrap">{{ msg.body }}</p>
    </div>
</div>
{% empty %}
<div class="text-center py-8">
    <p class="text-sm text-gray-500">まだメッセージはありません。</p>
</div>
{% endfor %}
