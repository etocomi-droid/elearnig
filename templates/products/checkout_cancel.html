{% extends "base.html" %}

{% block title %}決済がキャンセルされました{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 px-8 py-12">
            <!-- キャンセルアイコン -->
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-yellow-100 mb-6">
                <svg class="w-10 h-10 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-3">決済がキャンセルされました</h1>
            <p class="text-gray-600 mb-8">
                お支払いがキャンセルされました。<br>
                商品の購入をご希望の場合は、再度お手続きをお願いいたします。
            </p>

            <div class="space-y-3">
                <a href="javascript:history.back()"
                   class="block w-full px-6 py-3 rounded-lg text-sm font-medium text-white bg-blue-600
                          hover:bg-blue-700 transition-colors">
                    戻る
                </a>
                <a href="/"
                   class="block w-full px-6 py-3 rounded-lg text-sm font-medium text-gray-700 bg-gray-100
                          hover:bg-gray-200 transition-colors">
                    トップページへ
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
